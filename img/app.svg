  <rect width="16" height="16" rx="3" fill="url(#g)"/>
  <text x="8" y="12" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" font-weight="700" fill="#ffffff">S</text>
